<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drift Hunters: Advanced</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .ui-panel {
            position: absolute;
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00ff00;
        }
        .hud {
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        .menu-container {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }
        .button {
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: #000;
            border: none;
            padding: 12px 30px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .button:hover {
            background: linear-gradient(135deg, #00ff66, #00ff00);
            transform: scale(1.05);
        }
        .button:active {
            transform: scale(0.95);
        }
        h1 { font-size: 48px; margin: 20px 0; color: #00ff00; text-shadow: 0 0 20px #00ff00; }
        h2 { font-size: 32px; margin: 15px 0; color: #00ff00; }
        h3 { margin: 5px 0; font-size: 14px; }
        p { margin: 5px 0; font-size: 14px; }
        .car-select {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .car-option {
            background: rgba(0,100,0,0.3);
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .car-option:hover {
            background: rgba(0,150,0,0.5);
            box-shadow: 0 0 15px #00ff00;
        }
        .car-option.selected {
            background: rgba(0,200,0,0.7);
            box-shadow: 0 0 20px #00ff00;
        }
    </style>
</head>
<body>

<script>
// Game States
const GAME_STATE = {
    MENU: 'menu',
    GARAGE: 'garage',
    LEVEL_SELECT: 'levelSelect',
    PLAYING: 'playing',
    PAUSED: 'paused',
    GAME_OVER: 'gameOver',
    LEVEL_COMPLETE: 'levelComplete'
};

// Car Designs
const CARS = {
    'Red Pro': { color: [200, 30, 30], speed: 0.25, drift: 0.96 },
    'Blue Turbo': { color: [30, 100, 200], speed: 0.30, drift: 0.92 },
    'Yellow Speed': { color: [255, 200, 0], speed: 0.35, drift: 0.94 },
    'Purple Racer': { color: [150, 50, 200], speed: 0.28, drift: 0.90 }
};

const LEVELS = [
    {
        name: 'Beginner',
        width: 800,
        height: 600,
        trackWidth: 150,
        obstacles: 3,
        targetTime: 60
    },
    {
        name: 'Intermediate',
        width: 1000,
        height: 700,
        trackWidth: 120,
        obstacles: 6,
        targetTime: 45
    },
    {
        name: 'Advanced',
        width: 1200,
        height: 800,
        trackWidth: 100,
        obstacles: 10,
        targetTime: 40
    },
    {
        name: 'Expert',
        width: 1400,
        height: 900,
        trackWidth: 80,
        obstacles: 15,
        targetTime: 35
    }
];

let gameState = GAME_STATE.MENU;
let currentCar = 'Red Pro';
let currentLevel = 0;
let car;
let obstacles = [];
let score = 0;
let time = 0;
let levelComplete = false;
let crashDetected = false;

function setup() {
    createCanvas(1000, 700);
    frameRate(60);
}

function draw() {
    background(30);
    
    if (gameState === GAME_STATE.MENU) {
        drawMenu();
    } else if (gameState === GAME_STATE.GARAGE) {
        drawGarage();
    } else if (gameState === GAME_STATE.LEVEL_SELECT) {
        drawLevelSelect();
    } else if (gameState === GAME_STATE.PLAYING) {
        drawGame();
    } else if (gameState === GAME_STATE.PAUSED) {
        drawGame();
        drawPauseMenu();
    } else if (gameState === GAME_STATE.LEVEL_COMPLETE) {
        drawLevelComplete();
    } else if (gameState === GAME_STATE.GAME_OVER) {
        drawGameOver();
    }
}

function drawMenu() {
    fill(0, 255, 0);
    textAlign(CENTER, CENTER);
    textSize(48);
    text('DRIFT HUNTERS', width / 2, height / 2 - 100);
    
    textSize(24);
    fill(200);
    text('Advanced Edition', width / 2, height / 2 - 30);
    
    // Draw buttons
    drawButton(width / 2 - 100, height / 2 + 40, 200, 50, 'PLAY', () => {
        gameState = GAME_STATE.LEVEL_SELECT;
    });
    
    drawButton(width / 2 - 100, height / 2 + 110, 200, 50, 'GARAGE', () => {
        gameState = GAME_STATE.GARAGE;
    });
}

function drawGarage() {
    fill(0, 255, 0);
    textAlign(CENTER, CENTER);
    textSize(36);
    text('GARAGE', width / 2, 50);
    
    textSize(16);
    fill(200);
    text('Select Your Car:', width / 2, 100);
    
    let carNames = Object.keys(CARS);
    let carY = 150;
    
    carNames.forEach((carName, index) => {
        let carData = CARS[carName];
        let isSelected = carName === currentCar;
        
        // Draw car selection box
        fill(isSelected ? 50 : 20);
        stroke(isSelected ? 0 : 100, 255, 0);
        strokeWeight(3);
        rect(width / 2 - 150, carY + index * 80, 300, 60);
        
        // Car info
        fill(isSelected ? 0 : 100, 255, 0);
        textSize(18);
        text(carName, width / 2, carY + index * 80 + 15);
        
        textSize(12);
        fill(150);
        text(`Speed: ${carData.speed.toFixed(2)} | Drift: ${carData.drift.toFixed(2)}`, width / 2, carY + index * 80 + 35);
        
        // Click detection
        if (mouseIsPressed && 
            mouseX > width / 2 - 150 && mouseX < width / 2 + 150 &&
            mouseY > carY + index * 80 && mouseY < carY + index * 80 + 60) {
            currentCar = carName;
        }
    });
    
    // Back button
    drawButton(width / 2 - 80, height - 80, 160, 50, 'BACK', () => {
        gameState = GAME_STATE.MENU;
    });
}

function drawLevelSelect() {
    fill(0, 255, 0);
    textAlign(CENTER, CENTER);
    textSize(36);
    text('SELECT LEVEL', width / 2, 50);
    
    LEVELS.forEach((level, index) => {
        let levelX = 100 + index * 200;
        let levelY = 200;
        
        // Level box
        fill(30);
        stroke(0, 150, 255);
        strokeWeight(2);
        rect(levelX, levelY, 150, 150);
        
        // Level name
        fill(0, 255, 0);
        textSize(20);
        text(level.name, levelX + 75, levelY + 40);
        
        // Level info
        fill(200);
        textSize(12);
        text(`Obstacles: ${level.obstacles}`, levelX + 75, levelY + 70);
        text(`Time: ${level.targetTime}s`, levelX + 75, levelY + 95);
        
        // Click detection
        if (mouseIsPressed &&
            mouseX > levelX && mouseX < levelX + 150 &&
            mouseY > levelY && mouseY < levelY + 150) {
            currentLevel = index;
            startLevel();
        }
    });
    
    // Back button
    drawButton(width / 2 - 80, height - 80, 160, 50, 'BACK', () => {
        gameState = GAME_STATE.MENU;
    });
}

function startLevel() {
    gameState = GAME_STATE.PLAYING;
    let level = LEVELS[currentLevel];
    resizeCanvas(level.width, level.height);
    
    let carData = CARS[currentCar];
    car = new Drifter(width / 2, height / 2, carData);
    
    obstacles = [];
    generateObstacles(level.obstacles);
    score = 0;
    time = 0;
    levelComplete = false;
    crashDetected = false;
}

function generateObstacles(count) {
    obstacles = [];
    for (let i = 0; i < count; i++) {
        let x, y, valid;
        do {
            valid = true;
            x = random(100, width - 100);
            y = random(100, height - 100);
            
            // Check distance from player
            if (dist(x, y, width / 2, height / 2) < 150) {
                valid = false;
            }
        } while (!valid);
        
        obstacles.push({
            x: x,
            y: y,
            w: 40,
            h: 40,
            color: [255, 100, 0]
        });
    }
}

function drawGame() {
    let level = LEVELS[currentLevel];
    
    // Draw track
    drawTrack();
    
    // Draw obstacles
    obstacles.forEach(obs => {
        fill(obs.color);
        rect(obs.x, obs.y, obs.w, obs.h);
    });
    
    // Update and draw car
    car.update();
    car.display();
    
    // Check collisions
    obstacles.forEach((obs, index) => {
        if (car.checkCollision(obs)) {
            crashDetected = true;
        }
    });
    
    // Update time and score
    time += 1 / 60;
    score = floor(car.vel.mag() * 10);
    
    // Check if level complete (reach finish line)
    if (dist(car.pos.x, car.pos.y, width / 2, 100) < 50) {
        levelComplete = true;
        gameState = GAME_STATE.LEVEL_COMPLETE;
    }
    
    // Game over condition
    if (time > level.targetTime * 1.5 || crashDetected) {
        gameState = GAME_STATE.GAME_OVER;
    }
    
    // Draw HUD
    drawHUD();
}

function drawTrack() {
    let level = LEVELS[currentLevel];
    
    // Outer track boundary
    noFill();
    stroke(60);
    strokeWeight(level.trackWidth / 2);
    rect(100, 100, width - 200, height - 200, 50);
    
    // Center line
    stroke(255, 204, 0, 100);
    strokeWeight(2);
    setLineDash([20, 20]);
    rect(100, 100, width - 200, height - 200, 50);
    setLineDash([]);
    
    // Finish line
    stroke(0, 255, 0);
    strokeWeight(3);
    line(width / 2 - 30, 100, width / 2 + 30, 100);
}

function drawHUD() {
    fill(0, 255, 0);
    textSize(16);
    textAlign(LEFT);
    
    text('Speed: ' + floor(car.vel.mag() * 10), 20, 30);
    text('Score: ' + score, 20, 55);
    text('Time: ' + floor(time) + 's', 20, 80);
    text('Level: ' + LEVELS[currentLevel].name, 20, 105);
    text('Car: ' + currentCar, 20, 130);
    
    textAlign(RIGHT);
    text('Press P to Pause', width - 20, 30);
}

function drawPauseMenu() {
    fill(0, 0, 0, 200);
    rect(0, 0, width, height);
    
    fill(0, 255, 0);
    textAlign(CENTER, CENTER);
    textSize(48);
    text('PAUSED', width / 2, height / 2 - 80);
    
    drawButton(width / 2 - 100, height / 2 + 20, 200, 50, 'RESUME', () => {
        gameState = GAME_STATE.PLAYING;
    });
    
    drawButton(width / 2 - 100, height / 2 + 90, 200, 50, 'MENU', () => {
        gameState = GAME_STATE.MENU;
        resizeCanvas(1000, 700);
    });
}

function drawLevelComplete() {
    fill(0, 0, 0, 200);
    rect(0, 0, width, height);
    
    fill(0, 255, 0);
    textAlign(CENTER, CENTER);
    textSize(48);
    text('LEVEL COMPLETE!', width / 2, height / 2 - 100);
    
    textSize(24);
    fill(200);
    text('Score: ' + score, width / 2, height / 2 - 20);
    text('Time: ' + floor(time) + 's', width / 2, height / 2 + 20);
    
    if (currentLevel < LEVELS.length - 1) {
        drawButton(width / 2 - 100, height / 2 + 100, 200, 50, 'NEXT LEVEL', () => {
            currentLevel++;
            startLevel();
        });
    } else {
        drawButton(width / 2 - 100, height / 2 + 100, 200, 50, 'RESTART', () => {
            currentLevel = 0;
            gameState = GAME_STATE.LEVEL_SELECT;
            resizeCanvas(1000, 700);
        });
    }
    
    drawButton(width / 2 - 100, height / 2 + 170, 200, 50, 'MENU', () => {
        gameState = GAME_STATE.MENU;
        resizeCanvas(1000, 700);
    });
}

function drawGameOver() {
    fill(0, 0, 0, 200);
    rect(0, 0, width, height);
    
    fill(255, 0, 0);
    textAlign(CENTER, CENTER);
    textSize(48);
    text('GAME OVER', width / 2, height / 2 - 100);
    
    textSize(24);
    fill(200);
    let reason = crashDetected ? 'Crashed!' : 'Time Limit Exceeded';
    text(reason, width / 2, height / 2 - 20);
    text('Score: ' + score, width / 2, height / 2 + 20);
    
    drawButton(width / 2 - 100, height / 2 + 100, 200, 50, 'RETRY', () => {
        startLevel();
    });
    
    drawButton(width / 2 - 100, height / 2 + 170, 200, 50, 'MENU', () => {
        gameState = GAME_STATE.MENU;
        resizeCanvas(1000, 700);
    });
}

function drawButton(x, y, w, h, label, action) {
    // Check for click
    if (mouseIsPressed &&
        mouseX > x && mouseX < x + w &&
        mouseY > y && mouseY < y + h) {
        action();
    }
    
    // Draw button
    fill(0, 200, 0);
    rect(x, y, w, h);
    
    fill(0);
    textAlign(CENTER, CENTER);
    textSize(18);
    text(label, x + w / 2, y + h / 2);
}

function setLineDash(list) {
    drawingContext.setLineDash(list);
}

class Drifter {
    constructor(x, y, carData) {
        this.pos = createVector(x, y);
        this.vel = createVector(0, 0);
        this.acc = createVector(0, 0);
        this.angle = 0;
        
        this.driftFactor = carData.drift;
        this.friction = 0.985;
        this.turnSensitivity = 0.07;
        this.power = carData.speed;
        this.carColor = carData.color;
    }

    update() {
        if (keyIsDown(UP_ARROW)) {
            let engineForce = p5.Vector.fromAngle(this.angle);
            engineForce.mult(this.power);
            this.acc.add(engineForce);
        }
        if (keyIsDown(LEFT_ARROW)) this.angle -= this.turnSensitivity;
        if (keyIsDown(RIGHT_ARROW)) this.angle += this.turnSensitivity;

        this.vel.add(this.acc);
        
        let forwardDir = p5.Vector.fromAngle(this.angle);
        let lateralDir = p5.Vector.fromAngle(this.angle + HALF_PI);

        let fSpeed = this.vel.dot(forwardDir);
        let lSpeed = this.vel.dot(lateralDir);

        let newLateral = lateralDir.copy().mult(lSpeed * this.driftFactor);
        let newForward = forwardDir.copy().mult(fSpeed);

        this.vel = newForward.add(newLateral);
        this.vel.mult(this.friction);
        
        this.pos.add(this.vel);
        this.acc.mult(0);

        if (this.pos.x > width) this.pos.x = 0;
        if (this.pos.x < 0) this.pos.x = width;
        if (this.pos.y > height) this.pos.y = 0;
        if (this.pos.y < 0) this.pos.y = height;
    }

    display() {
        push();
        translate(this.pos.x, this.pos.y);
        rotate(this.angle);
        
        fill(0, 50);
        noStroke();
        rect(2, 2, 40, 20, 5);
        
        fill(this.carColor);
        stroke(0);
        strokeWeight(1);
        rectMode(CENTER);
        rect(0, 0, 40, 20, 4);
        
        fill(50);
        rect(12, 0, 8, 16);
        fill(255, 255, 0);
        rect(18, -7, 3, 5);
        rect(18, 7, 3, 5);
        pop();
    }

    checkCollision(obstacle) {
        let dx = this.pos.x - (obstacle.x + obstacle.w / 2);
        let dy = this.pos.y - (obstacle.y + obstacle.h / 2);
        let distance = sqrt(dx * dx + dy * dy);
        
        return distance < 30;
    }
}

function keyPressed() {
    if (key === 'p' || key === 'P') {
        if (gameState === GAME_STATE.PLAYING) {
            gameState = GAME_STATE.PAUSED;
        } else if (gameState === GAME_STATE.PAUSED) {
            gameState = GAME_STATE.PLAYING;
        }
    }
}

function windowResized() {
    if (gameState === GAME_STATE.PLAYING || gameState === GAME_STATE.PAUSED) {
        let level = LEVELS[currentLevel];
        resizeCanvas(level.width, level.height);
    }
}
</script>

</body>
