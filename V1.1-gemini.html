<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drift Hunters Pro: Full Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #050505; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); padding: 40px; border: 2px solid #00ff00;
            border-radius: 5px; text-align: center; pointer-events: all;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
        }
        input { 
            display: block; width: 250px; margin: 15px auto; padding: 12px; 
            background: #111; border: 1px solid #00ff00; color: #00ff00; font-family: monospace;
        }
        button { 
            background: #00ff00; color: #000; border: none; padding: 15px 40px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s;
        }
        button:hover { background: #00cc00; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="login-screen" class="overlay">
        <h1 style="color:#00ff00; margin-top:0;">DRIFT HUNTERS PRO</h1>
        <p style="color:#888;">ADVANCED TELEMETRY INITIALIZED</p>
        <input type="text" id="username" placeholder="USERNAME">
        <input type="password" id="password" placeholder="PASSWORD">
        <button onclick="attemptLogin()">Enter Simulation</button>
        <p style="color:#555; font-size: 10px; margin-top: 20px;">CREDENTIALS REQUIRED FOR ADMIN ACCESS</p>
    </div>
</div>

<script>
/**
 * SECTION 1: GLOBAL CONSTANTS & CONFIGURATION
 */
const SETTINGS = {
    GRAVITY: 9.81,
    FRICTION: 0.99,         // Air/Rolling resistance
    DRIFT_INTENSITY: 0.85,  
    MONEY_PER_DRIFT: 0.5,
    SKID_LIFE: 200,         
    TRACK_WIDTH: 450,
    CAMERA_LERP: 0.12,
    LATERAL_FRICTION: 0.92, // Side grip
    LONGITUDINAL_FRICTION: 0.99 // Forward grip
};

const CAR_CATALOG = {
    'Red Pro': {
        name: 'Red Pro',
        color: [220, 30, 30],
        speed: 0.35,
        handling: 0.08,
        driftFactor: 0.94, // How much grip is lost sideways
        price: 0,
        isGTR: false
    },
    'Nissan GT-R': {
        name: 'Nissan GT-R R35',
        color: [180, 180, 185],
        speed: 0.48,
        handling: 0.095,
        driftFactor: 0.91, 
        price: 500,
        isGTR: true
    }
};

/**
 * SECTION 2: CORE GAME VARIABLES
 */
let gameState = 'LOGIN';
let userMoney = 0;
let myCar;
let currentCarModel = 'Red Pro';
let ownedCars = ['Red Pro'];

let cameraPos;
let skidMarks = [];
let particles = [];
let trackNodes = [];
let worldObstacles = [];
let currentMapType = 'TRACK';

/**
 * SECTION 3: P5.JS SYSTEM FUNCTIONS
 */
function setup() {
    createCanvas(windowWidth, windowHeight);
    cameraPos = createVector(0, 0);
    rectMode(CENTER);
    imageMode(CENTER);
    noLoop();
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}

function attemptLogin() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    if (user === 'car' && pass === 'ami') {
        userMoney = 999999;
        initGame();
    } else if (user === '1' && pass === '1') {
        userMoney = 0;
        initGame();
    } else {
        alert("ACCESS DENIED: INVALID CREDENTIALS");
    }
}

function initGame() {
    document.getElementById('login-screen').style.display = 'none';
    gameState = 'MENU';
    loop();
}

/**
 * SECTION 4: MAIN RENDER LOOP
 */
function draw() {
    background(10);

    if (gameState === 'MENU') {
        drawMenu();
    } else if (gameState === 'SHOP') {
        drawShop();
    } else if (gameState === 'PLAYING') {
        runSimulation();
    }
}

/**
 * SECTION 5: SIMULATION ENGINE
 */
function runSimulation() {
    cameraPos.x = lerp(cameraPos.x, myCar.pos.x - width / 2, SETTINGS.CAMERA_LERP);
    cameraPos.y = lerp(cameraPos.y, myCar.pos.y - height / 2, SETTINGS.CAMERA_LERP);

    push();
    translate(-cameraPos.x, -cameraPos.y);

    drawGrid();
    if (currentMapType === 'TRACK') {
        renderS_Track();
    } else {
        renderOpenWorld();
    }

    updateEffects();
    myCar.process();
    myCar.render();
    pop();

    renderHUD();
}

/**
 * SECTION 6: PHYSICS & OBJECT CLASSES
 */
class Car {
    constructor(x, y, stats) {
        this.pos = createVector(x, y);
        this.vel = createVector(0, 0);
        this.acc = createVector(0, 0);
        this.angle = 0;
        this.steering = 0;
        this.stats = stats;
        this.isDrifting = false;
        this.driftAngle = 0;
    }

    process() {
        this.handleInput();
        this.applyPhysics();
        this.checkCollisions();
    }

    handleInput() {
        // Linear acceleration
        if (keyIsDown(UP_ARROW) || keyIsDown(87)) {
            let force = p5.Vector.fromAngle(this.angle).mult(this.stats.speed);
            this.acc.add(force);
        }
        if (keyIsDown(DOWN_ARROW) || keyIsDown(83)) {
            let force = p5.Vector.fromAngle(this.angle).mult(-this.stats.speed * 0.6);
            this.acc.add(force);
        }

        // Improved steering with momentum
        let targetSteer = 0;
        if (keyIsDown(LEFT_ARROW) || keyIsDown(65)) targetSteer = -this.stats.handling;
        if (keyIsDown(RIGHT_ARROW) || keyIsDown(68)) targetSteer = this.stats.handling;
        
        // Steering weight
        this.steering = lerp(this.steering, targetSteer, 0.15);
        
        // Only turn if moving
        let turnSpeedStat = map(this.vel.mag(), 0, 15, 0, 1.2);
        this.angle += this.steering * turnSpeedStat;
    }

    applyPhysics() {
        this.vel.add(this.acc);
        
        // Calculate Forward vs Lateral velocity
        let forwardVec = p5.Vector.fromAngle(this.angle);
        let rightVec = p5.Vector.fromAngle(this.angle + HALF_PI);

        let fVel = forwardVec.copy().mult(this.vel.dot(forwardVec));
        let rVel = rightVec.copy().mult(this.vel.dot(rightVec));

        // DRIFT PHYSICS LOGIC:
        // Lateral friction is much lower than forward friction
        // As speed increases, rear grip (lateral) decreases
        let slipFactor = this.stats.driftFactor; 
        if (rVel.mag() > 2) {
            slipFactor *= 0.95; // Once sliding, it gets slippier
            this.isDrifting = true;
        } else {
            this.isDrifting = false;
        }

        this.vel = fVel.mult(SETTINGS.LONGITUDINAL_FRICTION).add(rVel.mult(slipFactor));
        this.pos.add(this.vel);
        this.acc.mult(0);

        // Visual effects for drifting
        if (this.isDrifting && this.vel.mag() > 3) {
            userMoney += SETTINGS.MONEY_PER_DRIFT;
            // Add skids for rear wheels
            let offset = p5.Vector.fromAngle(this.angle + HALF_PI).mult(10);
            skidMarks.push(new SkidMark(this.pos.x + offset.x, this.pos.y + offset.y, this.angle));
            skidMarks.push(new SkidMark(this.pos.x - offset.x, this.pos.y - offset.y, this.angle));
            
            if (frameCount % 2 === 0) {
                particles.push(new Particle(this.pos.x - forwardVec.x*20, this.pos.y - forwardVec.y*20));
            }
        }
    }

    checkCollisions() {
        if (currentMapType === 'OPEN') {
            for (let o of worldObstacles) {
                if (dist(this.pos.x, this.pos.y, o.x, o.y) < 60) this.reset();
            }
        } else {
            let onAsphalt = false;
            for (let n of trackNodes) {
                if (dist(this.pos.x, this.pos.y, n.x, n.y) < SETTINGS.TRACK_WIDTH * 0.95) {
                    onAsphalt = true;
                    break;
                }
            }
            if (!onAsphalt) {
                this.vel.mult(0.9); // Grass friction
                if(this.vel.mag() < 1) this.reset();
            }
            
            let target = trackNodes[trackNodes.length - 1];
            if (dist(this.pos.x, this.pos.y, target.x, target.y) < 200) {
                gameState = 'MENU';
                alert("RACE COMPLETE! +$1000");
                userMoney += 1000;
            }
        }
    }

    reset() {
        this.pos.set(0, 0);
        this.vel.mult(0);
        this.angle = 0;
    }

    render() {
        push();
        translate(this.pos.x, this.pos.y);
        // Visual "tilt" or oversteer look
        let driftVisual = this.vel.heading() - this.angle;
        rotate(this.angle + (this.isDrifting ? driftVisual * 0.2 : 0));

        if (this.stats.isGTR) {
            this.drawGTR();
        } else {
            this.drawClassic();
        }
        pop();
    }

    drawClassic() {
        fill(this.stats.color);
        stroke(0);
        strokeWeight(2);
        rect(0, 0, 50, 25, 5);
        fill(40);
        rect(5, 0, 15, 20, 2);
    }

    drawGTR() {
        noStroke();
        fill(20, 100); rect(2, 4, 54, 28, 4); 
        fill(this.stats.color); rect(0, 0, 52, 26, 3); 
        fill(20); rect(4, 0, 22, 22, 2); 
        fill(50); rect(6, 0, 18, 19, 1);
        fill(255, 0, 0);
        ellipse(-22, -8, 6, 6); ellipse(-22, 8, 6, 6);
        fill(60); rect(-24, 0, 6, 26);
        fill(255, 255, 150);
        rect(24, -10, 8, 4); rect(24, 10, 8, 4);
    }
}

class SkidMark {
    constructor(x, y, a) {
        this.x = x; this.y = y; this.a = a;
        this.life = SETTINGS.SKID_LIFE;
    }
    display() {
        push();
        translate(this.x, this.y);
        rotate(this.a);
        noStroke();
        fill(0, map(this.life, 0, SETTINGS.SKID_LIFE, 0, 80));
        rect(-10, 0, 15, 6);
        pop();
    }
}

class Particle {
    constructor(x, y) {
        this.pos = createVector(x, y);
        this.vel = createVector(random(-1,1), random(-1,1));
        this.alpha = 150;
        this.size = random(5, 15);
    }
    update() {
        this.pos.add(this.vel);
        this.alpha -= 3;
    }
    display() {
        noStroke();
        fill(220, this.alpha);
        ellipse(this.pos.x, this.pos.y, this.size);
    }
}

/**
 * SECTION 7: ENVIRONMENT GENERATION
 */
function createTrack() {
    trackNodes = [];
    let startX = 0;
    let startY = 0;
    for (let i = 0; i < 30; i++) {
        let x = startX + i * 600;
        let y = startY + (i > 2 ? sin(i * 0.5) * 1200 : 0);
        trackNodes.push(createVector(x, y));
    }
}

function createOpenWorld() {
    worldObstacles = [];
    for (let i = 0; i < 80; i++) {
        worldObstacles.push(createVector(random(-4000, 4000), random(-4000, 4000)));
    }
}

/**
 * SECTION 8: DRAWING UTILITIES
 */
function drawGrid() {
    stroke(255, 10);
    strokeWeight(1);
    let step = 400;
    let startX = floor((cameraPos.x - 1000) / step) * step;
    let startY = floor((cameraPos.y - 1000) / step) * step;
    for (let x = startX; x < startX + width + 2000; x += step) line(x, startY, x, startY + height + 2000);
    for (let y = startY; y < startY + height + 2000; y += step) line(startX, y, startX + width + 2000, y);
}

function renderS_Track() {
    noFill();
    stroke(30);
    strokeWeight(SETTINGS.TRACK_WIDTH + 40);
    beginShape();
    for (let p of trackNodes) curveVertex(p.x, p.y);
    endShape();

    stroke(200, 0, 0);
    strokeWeight(SETTINGS.TRACK_WIDTH + 10);
    beginShape();
    for (let p of trackNodes) curveVertex(p.x, p.y);
    endShape();

    stroke(60);
    strokeWeight(SETTINGS.TRACK_WIDTH - 20);
    beginShape();
    for (let p of trackNodes) curveVertex(p.x, p.y);
    endShape();

    let f = trackNodes[trackNodes.length - 1];
    fill(0, 255, 0);
    noStroke();
    rect(f.x, f.y, 40, SETTINGS.TRACK_WIDTH);
}

function renderOpenWorld() {
    for (let o of worldObstacles) {
        fill(255, 100, 0);
        stroke(255);
        strokeWeight(2);
        triangle(o.x, o.y - 40, o.x - 20, o.y + 10, o.x + 20, o.y + 10);
    }
}

function updateEffects() {
    for (let i = skidMarks.length - 1; i >= 0; i--) {
        skidMarks[i].display();
        skidMarks[i].life--;
        if (skidMarks[i].life <= 0) skidMarks.splice(i, 1);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].display();
        if (particles[i].alpha <= 0) particles.splice(i, 1);
    }
}

/**
 * SECTION 9: MENU SYSTEM
 */
function drawMenu() {
    fill(0, 255, 0);
    textAlign(CENTER);
    textSize(70);
    text("GARAGE", width/2, height/4);
    
    textSize(22);
    fill(255);
    text("ACTIVE VEHICLE: " + currentCarModel, width/2, height/4 + 60);
    text("WALLET: $" + floor(userMoney), width/2, height/4 + 90);

    drawButton(width/2, height/2 - 20, "STAGE 1: CANYON DRIFT", () => {
        currentMapType = 'TRACK';
        createTrack();
        startSim();
    });

    drawButton(width/2, height/2 + 60, "STAGE 2: INDUSTRIAL PARK", () => {
        currentMapType = 'OPEN';
        createOpenWorld();
        startSim();
    });

    drawButton(width/2, height/2 + 140, "THE SHOWROOM (SHOP)", () => {
        gameState = 'SHOP';
    });
}

function drawShop() {
    background(5);
    fill(0, 255, 0);
    textSize(40);
    textAlign(CENTER);
    text("VEHICLE SELECTION", width/2, 100);

    let xOff = width/2 - 220;
    for (let key in CAR_CATALOG) {
        let car = CAR_CATALOG[key];
        let owned = ownedCars.includes(key);
        let hover = mouseX > xOff && mouseX < xOff + 200 && mouseY > 200 && mouseY < 450;
        
        fill(hover ? 40 : 20);
        stroke(0, 255, 0);
        rect(xOff + 100, 325, 200, 300, 10);
        
        fill(255);
        noStroke();
        textSize(20);
        text(car.name, xOff + 100, 230);
        textSize(16);
        fill(owned ? "#00ff00" : "#ffffff");
        text(owned ? (currentCarModel === key ? "SELECTED" : "TAP TO EQUIP") : "BUY: $" + car.price, xOff + 100, 420);

        if (hover && mouseIsPressed) {
            if (owned) {
                currentCarModel = key;
            } else if (userMoney >= car.price) {
                userMoney -= car.price;
                ownedCars.push(key);
                currentCarModel = key;
            }
            mouseIsPressed = false;
        }
        xOff += 240;
    }

    drawButton(width/2, height - 100, "RETURN TO GARAGE", () => {
        gameState = 'MENU';
    });
}

function startSim() {
    myCar = new Car(0, 0, CAR_CATALOG[currentCarModel]);
    skidMarks = [];
    particles = [];
    gameState = 'PLAYING';
}

function renderHUD() {
    textAlign(LEFT);
    textSize(28);
    fill(0, 255, 0);
    text("$" + floor(userMoney), 30, 50);
    
    textSize(14);
    fill(255);
    let speedKph = floor(myCar.vel.mag() * 12);
    text("SPEED: " + speedKph + " KM/H", 30, 80);
    if (myCar.isDrifting) {
        fill(0, 255, 0);
        text("DRIFTING +", 30, 100);
    }
    
    textAlign(RIGHT);
    fill(150);
    text("ESC / P: RETURN TO MENU", width - 30, 40);
    text("WASD / ARROWS TO DRIVE", width - 30, 60);
}

function drawButton(x, y, label, action) {
    let w = 350;
    let h = 60;
    let hover = mouseX > x - w/2 && mouseX < x + w/2 && mouseY > y - h/2 && mouseY < y + h/2;
    
    fill(hover ? 0 : 15, hover ? 255 : 220, 0);
    stroke(hover ? 255 : 0);
    rect(x, y, w, h, 8);
    
    fill(0);
    noStroke();
    textAlign(CENTER, CENTER);
    textSize(18);
    text(label, x, y);

    if (hover && mouseIsPressed) {
        action();
        mouseIsPressed = false;
    }
}

function keyPressed() {
    if (key === 'p' || key === 'P' || keyCode === ESCAPE) {
        gameState = 'MENU';
    }
}

</script>
</body>
</html>
