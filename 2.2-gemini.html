<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drift Hunters: Pro Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .ui-overlay { position: absolute; background: rgba(0,0,0,0.95); padding: 30px; border: 2px solid #0f0; border-radius: 10px; text-align: center; width: 400px; z-index: 100; }
        input { display: block; width: 80%; margin: 10px auto; padding: 12px; background: #222; border: 1px solid #0f0; color: #0f0; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #0c0; transform: scale(1.05); }
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .money { color: #0f0; font-size: 24px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="login-screen" class="ui-overlay">
    <h1 style="color:#0f0; letter-spacing: 5px;">DRIFT PRO</h1>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkLogin()">INITIALIZE</button>
</div>

<div id="hud" style="display:none;">
    <div id="money-display" class="money">$0</div>
    <div id="status-msg" style="color:#fff; font-size:14px;">WASD to Drift | P for Menu</div>
</div>

<script>
let gameState = 'LOGIN';
let userMoney = 0;
let unlockedCars = ['Red Pro'];
let currentCar = 'Red Pro';
let car;
let obstacles = [];
let skidMarks = [];
let camX = 0, camY = 0;
let currentMap = 'OPEN';

const CARS = {
    'Red Pro': { color: [200, 30, 30], speed: 0.25, drift: 0.96, price: 0, isGTR: false },
    'Nissan GT-R': { color: [150, 150, 150], speed: 0.35, drift: 0.92, price: 500, isGTR: true }
};

// Track geometry
const trackPoints = [
    {x: 0, y: 0}, {x: 1000, y: 0}, {x: 1500, y: 500}, 
    {x: 1500, y: 1500}, {x: 500, y: 2000}, {x: -1000, y: 2000},
    {x: -1500, y: 2500}, {x: -1500, y: 3500}, {x: 0, y: 4000}
];

function setup() {
    createCanvas(windowWidth, windowHeight);
    rectMode(CENTER);
    noLoop();
}

function checkLogin() {
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    if (u === 'car' && p === 'ami') { userMoney = 999999; startGame(); }
    else if (u === '1' && p === '1') { userMoney = 0; startGame(); }
    else alert("Access Denied");
}

function startGame() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    gameState = 'MENU';
    loop();
}

function draw() {
    background(15);
    if (gameState === 'MENU') drawMenu();
    else if (gameState === 'SHOP') drawShop();
    else if (gameState === 'PLAYING') updateGame();
    else if (gameState === 'WIN') drawWinScreen();
}

function drawMenu() {
    fill(0, 255, 0); textAlign(CENTER); textSize(40);
    text("GARAGE & TRACKS", width/2, height/4);
    drawBtn(width/2, height/2 - 50, "S-TRACK (Long Circuit)", () => initLevel('TRACK'));
    drawBtn(width/2, height/2 + 20, "OPEN WORLD (Hard Cones)", () => initLevel('OPEN'));
    drawBtn(width/2, height/2 + 90, "ENTER SHOP", () => gameState = 'SHOP');
}

function drawShop() {
    fill(0, 255, 0); textSize(30); text("THE SHOWROOM", width/2, 100);
    let x = width/2 - 160;
    for (let name in CARS) {
        let c = CARS[name];
        let owned = unlockedCars.includes(name);
        fill(owned ? 40 : 25); stroke(0, 255, 0);
        rect(x + 75, 250, 140, 180, 10);
        noStroke(); fill(255); textSize(14); 
        text(name, x + 75, 200);
        text(owned ? "READY" : "$" + c.price, x + 75, 320);
        if (mouseIsPressed && mouseX > x && mouseX < x+150 && mouseY > 160 && mouseY < 340) {
            if (owned) currentCar = name;
            else if (userMoney >= c.price) { userMoney -= c.price; unlockedCars.push(name); currentCar = name; }
        }
        x += 170;
    }
    drawBtn(width/2, 500, "RETURN", () => gameState = 'MENU');
}

function initLevel(type) {
    currentMap = type;
    car = new Drifter(0, 0, CARS[currentCar]);
    obstacles = [];
    skidMarks = [];
    if (type === 'OPEN') {
        for(let i=0; i<30; i++) {
            obstacles.push(createVector(random(-1500, 1500), random(-1500, 1500)));
        }
    }
    gameState = 'PLAYING';
}

function updateGame() {
    camX = lerp(camX, car.pos.x - width/2, 0.1);
    camY = lerp(camY, car.pos.y - height/2, 0.1);

    push();
    translate(-camX, -camY);
    
    // Draw Environment
    drawGrid();
    if (currentMap === 'TRACK') drawTrackStructure();
    else drawOpenHazards();

    // Skid Marks
    for (let i = skidMarks.length - 1; i >= 0; i--) {
        skidMarks[i].display();
        if (skidMarks[i].life <= 0) skidMarks.splice(i, 1);
    }

    car.update();
    car.display();
    pop();

    document.getElementById('money-display').innerText = "$" + floor(userMoney);
    if (keyIsDown(80)) gameState = 'MENU'; 
}

function drawGrid() {
    stroke(255, 10); strokeWeight(1);
    for(let i=-2000; i<=4000; i+=200) {
        line(i, -2000, i, 4000);
        line(-2000, i, 4000, i);
    }
}

function drawTrackStructure() {
    noFill(); stroke(40); strokeWeight(300);
    beginShape();
    for(let p of trackPoints) curveVertex(p.x, p.y);
    endShape();

    stroke(255, 0, 0, 100); strokeWeight(320);
    beginShape();
    for(let p of trackPoints) curveVertex(p.x, p.y);
    endShape();

    // Start Line
    fill(255); noStroke(); rect(0, 0, 20, 300);
    // Finish Line
    fill(0, 255, 0); rect(0, 4000, 400, 40);

    // Collision check for S-Track borders
    let onTrack = false;
    // Simple distance check to track segments for reset
    for(let p of trackPoints) {
        if (dist(car.pos.x, car.pos.y, p.x, p.y) < 400) onTrack = true;
    }
    if (!onTrack) car.reset();
    if (dist(car.pos.x, car.pos.y, 0, 4000) < 100) gameState = 'WIN';
}

function drawOpenHazards() {
    for (let o of obstacles) {
        fill(255, 120, 0);
        stroke(255); strokeWeight(2);
        triangle(o.x, o.y - 30, o.x - 20, o.y + 20, o.x + 20, o.y + 20); // Large Cones
        if (dist(car.pos.x, car.pos.y, o.x, o.y) < 45) car.reset();
    }
}

function drawWinScreen() {
    fill(0, 255, 0); textAlign(CENTER); textSize(50);
    text("TRACK COMPLETE!", width/2, height/2);
    drawBtn(width/2, height/2 + 80, "MAIN MENU", () => gameState = 'MENU');
}

class Drifter {
    constructor(x, y, data) {
        this.pos = createVector(x, y);
        this.vel = createVector(0, 0);
        this.acc = createVector(0, 0);
        this.angle = 0;
        
        // PHYSICS FROM ORIGINAL CODE
        this.driftFactor = data.drift;
        this.friction = 0.985;
        this.turnSensitivity = 0.07;
        this.power = data.speed;
        this.data = data;
    }

    reset() {
        this.pos.set(0,0);
        this.vel.mult(0);
        this.angle = 0;
    }

    update() {
        if (keyIsDown(UP_ARROW) || keyIsDown(87)) {
            let engineForce = p5.Vector.fromAngle(this.angle).mult(this.power);
            this.acc.add(engineForce);
        }
        if (keyIsDown(LEFT_ARROW) || keyIsDown(65)) this.angle -= this.turnSensitivity;
        if (keyIsDown(RIGHT_ARROW) || keyIsDown(68)) this.angle += this.turnSensitivity;

        this.vel.add(this.acc);
        
        // DOT PRODUCT PHYSICS (EXACTLY AS PER ORIGINAL)
        let forwardDir = p5.Vector.fromAngle(this.angle);
        let lateralDir = p5.Vector.fromAngle(this.angle + HALF_PI);

        let fSpeed = this.vel.dot(forwardDir);
        let lSpeed = this.vel.dot(lateralDir);

        let newLateral = lateralDir.copy().mult(lSpeed * this.driftFactor);
        let newForward = forwardDir.copy().mult(fSpeed);

        this.vel = newForward.add(newLateral);
        this.vel.mult(this.friction);
        
        this.pos.add(this.vel);
        this.acc.mult(0);

        // Money for drifting
        if (abs(lSpeed) > 0.7) {
            userMoney += 0.15;
            skidMarks.push(new SkidMark(this.pos.x, this.pos.y, this.angle));
        }
    }

    display() {
        push();
        translate(this.pos.x, this.pos.y);
        rotate(this.angle);
        if (this.data.isGTR) {
            this.drawGTR();
        } else {
            // Classic Car (Your original design)
            fill(this.data.color); stroke(0);
            rect(0, 0, 40, 20, 4);
            fill(50); rect(12, 0, 8, 16);
            fill(255, 255, 0); rect(18, -7, 3, 5); rect(18, 7, 3, 5);
        }
        pop();
    }

    drawGTR() {
        // Pixel Nissan GT-R R35
        fill(30); rect(0, 0, 46, 22, 2); // Shadow
        fill(150); rect(0, 0, 42, 20, 2); // Body
        fill(20); rect(2, 0, 18, 16, 2); // Windows/Roof
        fill(80); rect(14, 0, 10, 18); // Hood vents area
        // GT-R Signature Round Taillights
        fill(255, 0, 0);
        ellipse(-16, -6, 5, 5); ellipse(-16, 6, 5, 5);
        ellipse(-12, -6, 3, 3); ellipse(-12, 6, 3, 3);
        // Wing
        fill(100); rect(-18, 0, 4, 18);
    }
}

class SkidMark {
    constructor(x, y, angle) {
        this.x = x; this.y = y; this.angle = angle;
        this.life = 180; // 3 seconds at 60fps
    }
    display() {
        push();
        translate(this.x, this.y); rotate(this.angle);
        noStroke(); fill(0, map(this.life, 0, 180, 0, 80));
        rect(-15, -8, 12, 4); rect(-15, 8, 12, 4);
        pop();
        this.life--;
    }
}

function drawBtn(x, y, txt, action) {
    let hover = mouseX > x-120 && mouseX < x+120 && mouseY > y-25 && mouseY < y+25;
    fill(hover ? 200 : 0, 255, 0);
    rect(x, y, 240, 50, 5);
    fill(0); noStroke(); textSize(18); text(txt, x, y+6);
    if (hover && mouseIsPressed) action();
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
