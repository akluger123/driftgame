<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drift Hunters: Pro Camera Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .ui-overlay { position: absolute; background: rgba(0,0,0,0.9); padding: 30px; border: 2px solid #0f0; border-radius: 10px; text-align: center; width: 400px; z-index: 10; }
        input { display: block; width: 80%; margin: 10px auto; padding: 10px; background: #222; border: 1px solid #0f0; color: #0f0; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #game-ui { position: absolute; top: 10px; left: 10px; z-index: 5; pointer-events: none; }
    </style>
</head>
<body>

<div id="login-screen" class="ui-overlay">
    <h1>DRIFT PRO</h1>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkLogin()">START ENGINE</button>
</div>

<div id="game-ui" style="display:none;">
    <h2 id="money-display" style="color: #0f0; text-shadow: 2px 2px #000;">$0</h2>
    <p>WASD/Arrows to Drive | P to Menu</p>
</div>

<script>
let gameState = 'LOGIN';
let userMoney = 0;
let unlockedCars = ['Red Pro'];
let currentCar = 'Red Pro';
let car;
let obstacles = [];
let skidMarks = [];
let camX = 0, camY = 0;

const CARS = {
    'Red Pro': { color: [200, 30, 30], speed: 0.25, drift: 0.96, price: 0, isGTR: false },
    'Nissan GT-R': { color: [180, 180, 180], speed: 0.4, drift: 0.93, price: 500, isGTR: true }
};

function setup() {
    createCanvas(windowWidth, windowHeight);
    noLoop();
}

function checkLogin() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    if (user === 'car' && pass === 'ami') { userMoney = 999999; startGame(); }
    else if (user === '1' && pass === '1') { userMoney = 0; startGame(); }
    else alert("Invalid");
}

function startGame() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    gameState = 'MENU';
    loop();
}

function draw() {
    background(20);
    if (gameState === 'MENU') drawMenu();
    else if (gameState === 'SHOP') drawShop();
    else if (gameState === 'PLAYING') updateGame();
}

function drawMenu() {
    fill(0, 255, 0); textAlign(CENTER); textSize(50);
    text("DRIFT PRO", width/2, height/3);
    drawBtn(width/2, height/2, "S-TRACK (Circuit)", () => initLevel('TRACK'));
    drawBtn(width/2, height/2 + 70, "OPEN WORLD (Expert)", () => initLevel('OPEN'));
    drawBtn(width/2, height/2 + 140, "SHOP", () => gameState = 'SHOP');
}

function drawShop() {
    fill(0, 255, 0); textSize(30); text("VEHICLE SHOP", width/2, 100);
    let x = width/2 - 150;
    for (let name in CARS) {
        let c = CARS[name];
        let owned = unlockedCars.includes(name);
        fill(owned ? 40 : 20); rect(x, 200, 140, 180, 10);
        fill(255); textSize(14); text(name, x+70, 230);
        text(owned ? "OWNED" : "$"+c.price, x+70, 350);
        if (mouseIsPressed && mouseX > x && mouseX < x+140 && mouseY > 200 && mouseY < 380) {
            if (owned) currentCar = name;
            else if (userMoney >= c.price) { userMoney -= c.price; unlockedCars.push(name); currentCar = name; }
        }
        x += 160;
    }
    drawBtn(width/2, 500, "BACK", () => gameState = 'MENU');
}

function initLevel(type) {
    car = new Drifter(0, 0, CARS[currentCar]);
    obstacles = [];
    skidMarks = [];
    currentMap = type;
    if (type === 'OPEN') {
        for(let i=0; i<40; i++) obstacles.push({x: random(-2000, 2000), y: random(-2000, 2000)});
    }
    gameState = 'PLAYING';
}

function updateGame() {
    // Camera easing
    camX = lerp(camX, car.pos.x - width/2, 0.1);
    camY = lerp(camY, car.pos.y - height/2, 0.1);

    push();
    translate(-camX, -camY);
    
    drawWorldBackground();
    
    // Draw and fade skid marks
    for (let i = skidMarks.length - 1; i >= 0; i--) {
        skidMarks[i].display();
        if (skidMarks[i].life <= 0) skidMarks.splice(i, 1);
    }

    if (currentMap === 'OPEN') {
        for (let o of obstacles) {
            fill(255, 100, 0); triangle(o.x, o.y-15, o.x-10, o.y+15, o.x+10, o.y+15);
        }
    } else {
        drawSTrack();
    }

    car.update();
    car.display();
    pop();

    document.getElementById('money-display').innerText = "$" + floor(userMoney);
    if (keyIsDown(80)) gameState = 'MENU'; // 'P' for menu
}

function drawWorldBackground() {
    stroke(30); strokeWeight(1);
    for(let x = -3000; x < 3000; x+=200) line(x, -3000, x, 3000);
    for(let y = -3000; y < 3000; y+=200) line(-3000, y, 3000, y);
}

function drawSTrack() {
    noFill(); stroke(50); strokeWeight(200);
    beginShape();
    curveVertex(-1000, 0); curveVertex(0, 0);
    curveVertex(800, 400); curveVertex(200, 800);
    curveVertex(1500, 1200); curveVertex(2000, 1500);
    endShape();
    
    stroke(255, 255, 255, 50); strokeWeight(5);
    beginShape();
    curveVertex(-1000, 0); curveVertex(0, 0);
    curveVertex(800, 400); curveVertex(200, 800);
    curveVertex(1500, 1200); curveVertex(2000, 1500);
    endShape();
}

class Drifter {
    constructor(x, y, data) {
        this.pos = createVector(x, y);
        this.vel = createVector(0, 0);
        this.angle = 0;
        this.data = data;
    }

    update() {
        if (keyIsDown(UP_ARROW) || keyIsDown(87)) {
            this.vel.add(p5.Vector.fromAngle(this.angle).mult(this.data.speed));
        }
        if (keyIsDown(LEFT_ARROW) || keyIsDown(65)) this.angle -= 0.05;
        if (keyIsDown(RIGHT_ARROW) || keyIsDown(68)) this.angle += 0.05;

        let forward = p5.Vector.fromAngle(this.angle);
        let side = p5.Vector.fromAngle(this.angle + HALF_PI);
        let fSpeed = this.vel.dot(forward);
        let sSpeed = this.vel.dot(side);

        if (abs(sSpeed) > 0.6) {
            userMoney += 0.2;
            skidMarks.push(new SkidMark(this.pos.x, this.pos.y, this.angle));
        }

        this.vel = forward.mult(fSpeed).add(side.mult(sSpeed * this.data.drift));
        this.vel.mult(0.98);
        this.pos.add(this.vel);
    }

    display() {
        push();
        translate(this.pos.x, this.pos.y);
        rotate(this.angle);
        if (this.data.isGTR) this.drawGTR();
        else { fill(this.data.color); rect(-20, -10, 40, 20, 3); }
        pop();
    }

    drawGTR() {
        // Pixel GT-R Body
        fill(40); rect(-22, -11, 44, 22, 2); // Shadow/Base
        fill(160); rect(-20, -10, 40, 20, 2); // Main Body
        fill(30); rect(-5, -8, 15, 16); // Windshield/Roof
        fill(100); rect(10, -9, 8, 18); // Hood Detail
        // Quad Tail Lights (GT-R Signature)
        fill(255, 0, 0); 
        ellipse(-18, -6, 4, 4); ellipse(-18, 6, 4, 4);
        ellipse(-15, -6, 3, 3); ellipse(-15, 6, 3, 3);
        // Headlights
        fill(255, 255, 200); rect(16, -9, 4, 3); rect(16, 6, 4, 3);
        // Wing
        fill(120); rect(-20, -10, 3, 20);
    }
}

class SkidMark {
    constructor(x, y, angle) {
        this.x = x; this.y = y; this.angle = angle;
        this.life = 180; // 3 seconds at 60fps
    }
    display() {
        push();
        translate(this.x, this.y); rotate(this.angle);
        noStroke(); fill(0, map(this.life, 0, 180, 0, 100));
        rect(-15, -9, 10, 3); rect(-15, 6, 10, 3);
        pop();
        this.life--;
    }
}

function drawBtn(x, y, txt, action) {
    let hover = mouseX > x-100 && mouseX < x+100 && mouseY > y-20 && mouseY < y+20;
    fill(hover ? 150 : 0, 200, 0);
    rect(x-100, y-20, 200, 40, 5);
    fill(0); textSize(16); text(txt, x, y+5);
    if (hover && mouseIsPressed) action();
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
